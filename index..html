<!DOCTYPE html>
<html lang="th">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger &amp; Edge — Trading Journal</title>

<style>
  :root{
    --bg:#050810; --bgVia:#070B18;
    --surface: rgba(20,28,50,0.5); --surface2: rgba(24,33,60,0.55);
    --glassBorder: rgba(255,255,255,0.08); --glassBorderStrong: rgba(255,255,255,0.14);
    --border:#25304C; --borderSoft: rgba(255,255,255,0.06);
    --text:#EDF0F8; --muted:#8791AC; --mutedDim:#4E5872;
    --mint:#3BAFCE; --mintDeep:#0B1B3D; --mintDim:rgba(59,175,206,0.14);
    --coral:#FF6E62; --coralDeep:#E8483C; --coralDim:rgba(255,110,98,0.12);
    --amber:#F0B23E;
    --violet:#2F6FED; --cyanGlow:#37D3E0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  body{
    min-height:100vh;
    background:
      radial-gradient(1100px 620px at 10% -10%, rgba(47,111,237,0.32), transparent 62%),
      radial-gradient(950px 560px at 105% 0%, rgba(55,211,224,0.26), transparent 60%),
      radial-gradient(800px 550px at 50% 115%, rgba(37,150,220,0.12), transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bgVia) 40%, var(--bg));
    background-attachment: fixed;
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--glassBorderStrong);border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::placeholder{color:var(--mutedDim);}
  button{font-family:'Inter',sans-serif;}

  /* glassmorphism surfaces */
  .glass{
    position:relative;
    background: linear-gradient(155deg, rgba(47,111,237,0.12), rgba(55,211,224,0.06) 55%, rgba(255,255,255,0.02) 100%);
    border: 1px solid var(--glassBorder);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
  }
  .glass::before{
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, rgba(47,111,237,0.9), rgba(55,211,224,0.9), rgba(72,190,235,0.9));
    opacity:0.55;
  }
  .glass-soft{
    background: linear-gradient(155deg, rgba(47,111,237,0.08), rgba(55,211,224,0.05));
    border: 1px solid var(--glassBorder);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border-radius: 12px;
  }

  /* inputs — thin border, glow on focus */
  .field-input{
    width:100%; background: rgba(8,12,24,0.5); border:1px solid var(--glassBorder);
    border-radius:10px; padding:10px 12px; color:var(--text); font-size:14px;
    font-family:'Inter',sans-serif; transition: box-shadow .18s ease, border-color .18s ease, background .18s ease;
  }
  .field-input:focus{
    outline:none; border-color: var(--cyanGlow); background: rgba(8,12,24,0.65);
    box-shadow: 0 0 0 3px rgba(55,211,224,0.16), 0 0 18px rgba(55,211,224,0.4);
  }

  /* toggle buttons (direction / result) */
  .toggle-btn{
    flex:1; padding:9px 0; border-radius:10px; cursor:pointer; font-size:13px; font-weight:600;
    background: rgba(255,255,255,0.03); border:1px solid var(--glassBorder); color:var(--muted);
    transition: all .16s ease;
  }
  .toggle-btn.on-mint{ color:#EAFAFF; background:linear-gradient(135deg, var(--mint), var(--mintDeep));
    border-color: transparent; box-shadow: 0 0 20px rgba(59,175,206,0.45), inset 0 1px 0 rgba(255,255,255,0.25); }
  .toggle-btn.on-coral{ color:#1A0503; background:linear-gradient(135deg, var(--coral), var(--coralDeep));
    border-color: transparent; box-shadow: 0 0 20px rgba(255,110,98,0.45), inset 0 1px 0 rgba(255,255,255,0.25); }
  .toggle-btn.on-amber{ color:#1C1204; background:linear-gradient(135deg, #F5C567, var(--amber));
    border-color: transparent; box-shadow: 0 0 20px rgba(240,178,62,0.4), inset 0 1px 0 rgba(255,255,255,0.25); }

  /* primary glowing action button */
  .btn-primary{
    width:100%; padding:12px 0; border-radius:12px; border:none; cursor:pointer;
    font-weight:700; font-size:14.5px; color:#06121F;
    background: linear-gradient(135deg, var(--cyanGlow), var(--violet));
    box-shadow: 0 0 26px rgba(55,211,224,0.4), 0 8px 20px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 0 34px rgba(55,211,224,0.55), 0 10px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3); }
  .btn-primary:active{ transform: translateY(0); }
  .btn-primary:disabled{ opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .chip-btn{
    display:flex; align-items:center; gap:5px; border-radius:9px; padding:7px 12px; font-size:12.5px;
    cursor:pointer; background: rgba(255,255,255,0.04); border:1px solid var(--glassBorder); color:var(--text);
    transition: background .15s ease, border-color .15s ease;
  }
  .chip-btn:hover{ background: rgba(255,255,255,0.08); }
  .chip-btn.danger{ color: var(--coral); border-color: rgba(255,110,98,0.35); background: rgba(255,110,98,0.06); }
  .chip-btn.danger:hover{ background: rgba(255,110,98,0.14); }

  /* tabs */
  .tab-btn{
    display:flex; align-items:center; gap:6px; padding:10px 16px; cursor:pointer; font-size:13.5px; font-weight:500;
    color:var(--muted); background:transparent; border:1px solid transparent; border-radius:10px 10px 0 0;
    margin-bottom:-1px; position:relative; top:1px; transition: color .15s ease, background .15s ease;
  }
  .tab-btn.active{
    color:var(--text); background: rgba(255,255,255,0.05);
    border-color: var(--glassBorder); border-bottom-color: transparent;
    box-shadow: 0 -8px 24px -8px rgba(55,211,224,0.35);
  }
  .tab-btn:not(.active):hover{ color:var(--text); }

  .image-slot-empty{
    width:100%; height:110px; border-radius:12px; border:1px dashed var(--glassBorderStrong);
    background: rgba(255,255,255,0.02); color:var(--muted); cursor:pointer; display:flex;
    flex-direction:column; align-items:center; justify-content:center; gap:6px; font-size:12px;
    transition: background .15s ease, border-color .15s ease;
  }
  .image-slot-empty:hover{ background: rgba(255,255,255,0.05); border-color: var(--cyanGlow); }

  .trade-row{ transition: background .15s ease; }
  .trade-row:hover{ background: rgba(255,255,255,0.03); }

  .icon-badge{
    width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, rgba(47,111,237,0.32), rgba(55,211,224,0.20));
    border: 1px solid rgba(255,255,255,0.1); flex-shrink:0;
  }

  .hero-globe-wrap{
    position:absolute; right:-30px; top:-36px; width:380px; height:210px;
    pointer-events:none;
    -webkit-mask-image: linear-gradient(to left, black 30%, transparent 92%);
    mask-image: linear-gradient(to left, black 30%, transparent 92%);
  }
  @media (max-width: 760px){ .hero-globe-wrap{ display:none; } }
  @media (max-width: 620px){ .stat-row{ grid-template-columns: repeat(2, 1fr) !important; } }
  @media (max-width: 640px){ .compliance-row{ grid-template-columns: 1fr !important; } }
  @media (min-width: 1300px){ .quad-grid{ grid-template-columns: repeat(4, 1fr) !important; } }
  @media (max-width: 700px){ .quad-grid{ grid-template-columns: 1fr !important; } }

  /* market session ticker */
  .ticker-bar{
    position:relative; overflow:hidden; white-space:nowrap;
    background: linear-gradient(90deg, #04060c, #060a16 45%, #04060c);
    border-bottom: 1px solid rgba(55,211,224,0.25);
    box-shadow: inset 0 -1px 0 rgba(55,211,224,0.1), 0 2px 16px rgba(0,0,0,0.5);
  }
  .ticker-bar::before, .ticker-bar::after{
    content:""; position:absolute; top:0; bottom:0; width:36px; z-index:2; pointer-events:none;
  }
  .ticker-bar::before{ left:0; background:linear-gradient(90deg, #04060c, transparent); }
  .ticker-bar::after{ right:0; background:linear-gradient(270deg, #04060c, transparent); }
  .ticker-track{
    display:inline-flex; align-items:center; gap:0;
    animation: ticker-scroll 34s linear infinite;
    will-change: transform;
  }
  .ticker-bar:hover .ticker-track{ animation-play-state: paused; }
  @keyframes ticker-scroll{
    from{ transform: translateX(0); }
    to{ transform: translateX(-50%); }
  }
  .ticker-item{
    display:inline-flex; align-items:center; gap:8px; padding:6px 26px;
    font-family:'JetBrains Mono', monospace; font-size:11.5px; letter-spacing:0.06em;
    color: rgba(237,240,248,0.75); border-right:1px solid rgba(255,255,255,0.08);
  }
  .ticker-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .ticker-dot.live{ background:#3EE8AE; box-shadow:0 0 6px #3EE8AE, 0 0 2px #3EE8AE; animation: ticker-pulse 1.6s ease-in-out infinite; }
  .ticker-dot.off{ background:#4E5872; }
  @keyframes ticker-pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.35; } }
  .ticker-sess{ color:#EDF0F8; font-weight:700; }
  .ticker-status-live{ color:#3EE8AE; }
  .ticker-status-off{ color:#8791AC; }
  @media (prefers-reduced-motion: reduce){ .ticker-track{ animation:none; } }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const C = {
  bg:"#050810", surface:"rgba(20,28,50,0.5)", surface2:"rgba(24,33,60,0.55)", border:"rgba(255,255,255,0.08)", borderSoft:"rgba(255,255,255,0.06)",
  text:"#EDF0F8", muted:"#8791AC", mutedDim:"#4E5872",

  blue:"#2F6FED", cyan:"#37D3E0",
  // institutional donut/bar palette — neon cyan against dark navy, muted brick instead of flashy red

  brick:"#B08078", brickDeep:"#6B4038", brickDark:"#2E1C18",

// ---------- tiny icon set (no external icon library needed) ----------
function Icon({ children, size = 16, color = "currentColor", style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, ...style }}>

    </svg>

}
const Icons = {
  BookOpen: (p) => <Icon {...p}><path d="M2 4h7a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 4h-7a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h8z"/></Icon>,

  TrendingDown: (p) => <Icon {...p}><polyline points="3 7 9 13 13 9 21 18"/><polyline points="15 18 21 18 21 12"/></Icon>,
  Camera: (p) => <Icon {...p}><path d="M4 8h3l2-3h6l2 3h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="14" r="3.5"/></Icon>,
  Trash2: (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1V6h10z"/></Icon>,
  Edit3: (p) => <Icon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></Icon>,
  X: (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="M6 6l12 12"/></Icon>,
  Plus: (p) => <Icon {...p}><path d="M12 5v14"/><path d="M5 12h14"/></Icon>,
  ChevronRight: (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>,
  AlertCircle: (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></Icon>,
  AlertTriangle: (p) => <Icon {...p}><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></Icon>,
  Download: (p) => <Icon {...p}><path d="M12 3v12"/><polyline points="7 11 12 16 17 11"/><path d="M5 21h14"/></Icon>,
  Upload: (p) => <Icon {...p}><path d="M12 21V9"/><polyline points="7 13 12 8 17 13"/><path d="M5 3h14"/></Icon>,
  Settings: (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>,
  Lock: (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>,
  Wallet: (p) => <Icon {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></Icon>,
  LogOut: (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><path d="M21 12H9"/></Icon>,
};

// ---------- decorative rotating wireframe globe (hero graphic) ----------
function projectPoint(theta, phi, R, tilt, rot, focal, cx, cy) {
  const x = R * Math.cos(phi) * Math.cos(theta);
  const y = R * Math.sin(phi);
  const z = R * Math.cos(phi) * Math.sin(theta);
  const y1 = y * Math.cos(tilt) - z * Math.sin(tilt);
  const z1 = y * Math.sin(tilt) + z * Math.cos(tilt);
  const x2 = x * Math.cos(rot) + z1 * Math.sin(rot);
  const z2 = -x * Math.sin(rot) + z1 * Math.cos(rot);
  const y2 = y1;
  const scale = focal / (focal + z2);
  const depth = (z2 + R) / (2 * R);
  return { x: cx + x2 * scale, y: cy + y2 * scale, depth };
}

function GlobeCanvas({ width = 380, height = 210 }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);

    const cx = width * 0.62, cy = height * 0.54;
    const R = Math.min(width, height) * 0.36;
    const focal = 340;
    const tilt = 0.36;
    const meridians = 10, phiSteps = 16;
    const latitudes = 6, thetaSteps = 26;

    const stars = Array.from({ length: 22 }, () => ({
      x: Math.random() * width, y: Math.random() * height,
      r: 0.6 + Math.random() * 1.1, speed: 0.5 + Math.random() * 1.2, seed: Math.random() * 10,
    }));

    // small glowing data-points that orbit the globe at varying radii/inclinations — reads as "live data", adds depth
    const orbiters = Array.from({ length: 7 }, (_, i) => ({
      incl: (Math.random() - 0.5) * 1.4,
      radiusMul: 1.12 + Math.random() * 0.22,
      speed: 0.22 + Math.random() * 0.3,
      phase: Math.random() * Math.PI * 2,
      size: 1.3 + Math.random() * 1.4,
    }));

    let raf;
    function frame(t) {
      const time = t * 0.001;
      const rot = time * 0.18;
      ctx.clearRect(0, 0, width, height);

      [{ rx: width * 0.62, ry: height * 0.4, deg: -16, base: 0.5 },
       { rx: width * 0.46, ry: height * 0.52, deg: 14, base: 0.3 }].forEach((o) => {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((o.deg * Math.PI) / 180);
        const grad = ctx.createLinearGradient(-o.rx, 0, o.rx, 0);
        grad.addColorStop(0, "rgba(59,175,206,0)");
        grad.addColorStop(0.65, `rgba(59,175,206,${o.base * 0.5})`);
        grad.addColorStop(1, `rgba(120,205,225,${o.base})`);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(0, 0, o.rx, o.ry, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      });

      // --- solid shaded sphere body (gives real volume before the wireframe is drawn on top) ---
      const lightAngle = 0.9; // light source direction, fixed relative to viewer for a stable "lit side"
      const lx = cx + Math.cos(lightAngle) * R * 0.55, ly = cy - R * 0.5 + Math.sin(lightAngle) * R * 0.2;
      const sphereGrad = ctx.createRadialGradient(lx, ly, R * 0.05, cx, cy, R * 1.05);
      sphereGrad.addColorStop(0, "rgba(150,220,240,0.42)");
      sphereGrad.addColorStop(0.35, "rgba(59,175,206,0.30)");
      sphereGrad.addColorStop(0.7, "rgba(18,45,85,0.24)");
      sphereGrad.addColorStop(1, "rgba(4,10,28,0.05)");
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fillStyle = sphereGrad;
      ctx.fill();

      // rim / atmosphere glow
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, R * 1.03, 0, Math.PI * 2);
      ctx.lineWidth = R * 0.16;
      ctx.strokeStyle = "rgba(59,175,206,0.24)";
      ctx.filter = "blur(4px)";
      ctx.stroke();
      ctx.restore();

      for (let m = 0; m < meridians; m++) {
        const theta = (m / meridians) * Math.PI * 2;
        let prev = null;
        for (let p = 0; p <= phiSteps; p++) {
          const phi = -Math.PI / 2 + (p / phiSteps) * Math.PI;
          const pt = projectPoint(theta, phi, R, tilt, rot, focal, cx, cy);
          if (prev) {
            const d = (pt.depth + prev.depth) / 2;
            ctx.strokeStyle = `rgba(70,165,195,${0.06 + d * 0.5})`;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(pt.x, pt.y); ctx.stroke();
          }
          prev = pt;
        }
      }
      for (let l = 1; l < latitudes; l++) {
        const phi = -Math.PI / 2 + (l / latitudes) * Math.PI;
        let prev = null;
        for (let s = 0; s <= thetaSteps; s++) {
          const theta = (s / thetaSteps) * Math.PI * 2;
          const pt = projectPoint(theta, phi, R, tilt, rot, focal, cx, cy);
          if (prev) {
            const d = (pt.depth + prev.depth) / 2;
            ctx.strokeStyle = `rgba(70,165,195,${0.06 + d * 0.5})`;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(pt.x, pt.y); ctx.stroke();
          }
          prev = pt;
        }
      }

      // specular highlight (small bright hotspot, gives it a glassy/lit look)
      ctx.beginPath();
      const specGrad = ctx.createRadialGradient(lx, ly, 0, lx, ly, R * 0.4);
      specGrad.addColorStop(0, "rgba(255,255,255,0.35)");
      specGrad.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = specGrad;
      ctx.arc(lx, ly, R * 0.4, 0, Math.PI * 2);
      ctx.fill();

      // orbiting data points — small satellites tracing tilted rings around the globe
      orbiters.forEach((o) => {
        const a = time * o.speed + o.phase;
        const rr = R * o.radiusMul;
        const ox = Math.cos(a) * rr;
        const oy = Math.sin(a) * rr * Math.sin(o.incl + tilt);
        const oz = Math.sin(a) * rr * Math.cos(o.incl + tilt);
        const scale = focal / (focal + oz);
        const depth = (oz + rr) / (2 * rr);
        const px = cx + ox * scale, py = cy + oy * scale;
        ctx.beginPath();
        ctx.fillStyle = `rgba(140,220,240,${0.25 + depth * 0.6})`;
        ctx.arc(px, py, o.size * (0.6 + depth * 0.6), 0, Math.PI * 2);
        ctx.fill();
      });

      stars.forEach((s) => {
        const tw = 0.5 + 0.5 * Math.sin(time * s.speed + s.seed);
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${0.25 + tw * 0.55})`;
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });

      raf = requestAnimationFrame(frame);
    }
    raf = requestAnimationFrame(frame);
    return () => cancelAnimationFrame(raf);
  }, [width, height]);

  return <canvas ref={ref} style={{ display: "block" }} />;
}

function wilsonLowerBound(wins, n, z = 1.44) {
  if (n === 0) return 0;
  const phat = wins / n;
  const denom = 1 + (z * z) / n;
  const center = phat + (z * z) / (2 * n);
  const margin = z * Math.sqrt((phat * (1 - phat)) / n + (z * z) / (4 * n * n));
  return Math.max(0, (center - margin) / denom);
}

function mean(arr) { return arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : 0; }
function stdDev(arr) {
  if (arr.length < 2) return 0;
  const m = mean(arr);
  return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / (arr.length - 1));
}
function holdTypeOf(mins) {
  if (mins === undefined || mins === null || mins === "" || Number.isNaN(mins)) return null;
  const m = parseFloat(mins);
  if (m < 15) return "Scalp";

}

function resizeImage(file, maxW = 640, quality = 0.55) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

      <line x1={pad.l} x2={width-pad.r} y1={zeroY} y2={zeroY} stroke={C.border} strokeWidth="1" />
      <polygon points={areaPoints} fill="url(#eqGrad)" />
      <polyline points={linePoints} fill="none" stroke="url(#eqLineGrad)" strokeWidth="2.5" filter="url(#eq-glow)" />
      <text x={pad.l} y={height-4} fontSize="10" fill={C.muted}>1</text>
      <text x={width-pad.r} y={height-4} fontSize="10" fill={C.muted} textAnchor="end">{data.length}</text>
      <text x={2} y={pad.t+8} fontSize="10" fill={C.muted}>{moneyMode ? fmt(max,0) : fmt(max,1)}</text>
      <text x={2} y={pad.t+h} fontSize="10" fill={C.muted}>{moneyMode ? fmt(min,0) : fmt(min,1)}</text>
    </svg>
  );
}

function SimpleBarChart({ data, valueKey, labelKey, colorFn, width = 300, height = 180, suffix = "" }) {
  if (!data.length) return null;
  const pad = { l: 26, r: 18, t: 16, b: 34 };
  const w = width - pad.l - pad.r, h = height - pad.t - pad.b;
  const max = Math.max(1, ...data.map(d => d[valueKey]));
  const bw = w / data.length;
  const depth = Math.min(9, bw * 0.22); // isometric extrusion depth, scales down for narrow bars
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id="bar-grad-mint" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#8FD3E8" />
          <stop offset="100%" stopColor="#1E7A94" />
        </linearGradient>
        <linearGradient id="bar-grad-coral" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#C9A29B" />
          <stop offset="100%" stopColor="#7A4E46" />
        </linearGradient>
        <filter id="bar-glow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="3.5" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
        <filter id="bar-shadow" x="-60%" y="-60%" width="220%" height="240%">
          <feGaussianBlur stdDeviation="2.5" />
        </filter>
      </defs>
      {[0,0.5,1].map((t,i) => <line key={i} x1={pad.l} x2={width-pad.r} y1={pad.t+h*(1-t)} y2={pad.t+h*(1-t)} stroke={C.borderSoft} strokeWidth="1" />)}
      {data.map((d,i) => {
        const val = d[valueKey];
        const barH = Math.max(1, (val/max)*h);
        const x = pad.l + i*bw + bw*0.15;
        const bwv = bw*0.6;
        const y = pad.t + h - barH;
        const tone = colorFn ? colorFn(d) : C.cyanNeon;
        const isCoral = tone === C.brick || tone === C.coral;
        const fillUrl = isCoral ? "url(#bar-grad-coral)" : "url(#bar-grad-mint)";
        const topFace = isCoral ? "#D9BBB5" : "#BEE4EE";
        const sideFace = isCoral ? "#4A2F29" : "#123F4C";
        const baseline = pad.t + h;
        return (
          <g key={i}>
            {/* grounding shadow */}
            <ellipse cx={x+bwv/2+depth/2} cy={baseline+2.5} rx={bwv/2+depth*0.6} ry={3} fill="rgba(0,0,0,0.35)" filter="url(#bar-shadow)" />

            <g filter="url(#bar-glow)">
              {/* side face (right) — darker, gives the block its shadowed flank */}
              <polygon points={`${x+bwv},${y} ${x+bwv+depth},${y-depth} ${x+bwv+depth},${baseline-depth} ${x+bwv},${baseline}`} fill={sideFace} opacity="0.9" />
              {/* front face */}
              <rect x={x} y={y} width={bwv} height={barH} fill={fillUrl} rx="3" />
              {/* top face (parallelogram) — lighter, catches the "light from above" */}
              <polygon points={`${x},${y} ${x+bwv},${y} ${x+bwv+depth},${y-depth} ${x+depth},${y-depth}`} fill={topFace} opacity="0.95" />
            </g>

            <text x={x+bwv/2+depth/2} y={pad.t+h+16} fontSize="9" fill={C.muted} textAnchor="middle">{d[labelKey]}</text>
            <text x={x+bwv/2+depth/2} y={y-depth-6} fontSize="9.5" fill={C.text} textAnchor="middle" fontFamily="'JetBrains Mono', monospace">{fmt(val,0)}{suffix}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ---------- rolling win rate line chart (0-100 range, 50% reference line) ----------
function RollingLineChart({ data, width = 640, height = 170, refLine = 50, suffix = "%" }) {
  if (!data.length) return null;
  const pad = { l: 30, r: 10, t: 10, b: 20 };
  const w = width - pad.l - pad.r, h = height - pad.t - pad.b;
  const xs = (i) => pad.l + (data.length === 1 ? w/2 : (i/(data.length-1))*w);
  const ys = (v) => pad.t + h - (Math.max(0, Math.min(100, v))/100)*h;
  const linePoints = data.map((d,i) => `${xs(i)},${ys(d.value)}`).join(" ");
  const refY = ys(refLine);
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id="rollGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={C.blue} />
          <stop offset="100%" stopColor={C.cyan} />
        </linearGradient>
        <filter id="roll-glow" x="-30%" y="-60%" width="160%" height="220%">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      {[0,50,100].map((t,i) => <line key={i} x1={pad.l} x2={width-pad.r} y1={ys(t)} y2={ys(t)} stroke={C.borderSoft} strokeWidth="1" />)}
      <line x1={pad.l} x2={width-pad.r} y1={refY} y2={refY} stroke={C.amber} strokeDasharray="4 3" strokeWidth="1" opacity="0.6" />
      <polyline points={linePoints} fill="none" stroke="url(#rollGrad)" strokeWidth="2.5" filter="url(#roll-glow)" />
      <text x={2} y={pad.t+6} fontSize="10" fill={C.muted}>100{suffix}</text>
      <text x={2} y={pad.t+h} fontSize="10" fill={C.muted}>0{suffix}</text>
      <text x={width-pad.r} y={refY-4} fontSize="9" fill={C.amber} textAnchor="end">50{suffix}</text>
    </svg>
  );
}

// ---------- calendar heatmap (daily R sum) ----------
function CalendarHeatmap({ data }) {
  if (!data.length) return null;
  const maxAbs = Math.max(1, ...data.map(d => Math.abs(d.r)));
  const months = {};
  data.forEach(d => {
    const m = d.date.slice(0,7);
    (months[m] = months[m] || []).push(d);
  });
  const monthKeys = Object.keys(months).sort();
  function cellColor(r) {
    if (r === 0) return "rgba(255,255,255,0.05)";
    const t = Math.min(1, Math.abs(r)/maxAbs);
    return r > 0 ? `rgba(62,232,174,${0.15+t*0.65})` : `rgba(255,110,98,${0.15+t*0.65})`;
  }
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
      {monthKeys.map(m => (
        <div key={m}>
          <div style={{ fontSize:10.5, color:C.muted, marginBottom:5, fontFamily:"'JetBrains Mono', monospace" }}>{m}</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
            {months[m].map(d => (
              <div key={d.date} title={`${d.date}: ${d.r>=0?"+":""}${d.r.toFixed(2)}R`}
                style={{ width:16, height:16, borderRadius:4, background:cellColor(d.r), border:"1px solid rgba(255,255,255,0.06)" }} />
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ---------- main app ----------
function App({ user }) {
  const [trades, setTrades] = useState([]);
  const [tab, setTab] = useState("log");
  const [form, setForm] = useState(() => {
    const n = nowLocalDatetime();
    return { ...initialForm, datetime: n, session: guessSession(n) };
  });
  const [editingId, setEditingId] = useState(null);
  const [imgBefore, setImgBefore] = useState(null);
  const [imgAfter, setImgAfter] = useState(null);
  const [error, setError] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [settings, setSettings] = useState(initialSettings);
  const [showSettings, setShowSettings] = useState(false);
  const [overrideChecked, setOverrideChecked] = useState(false);
  const importRef = useRef(null);

  const [cloudError, setCloudError] = useState("");

  useEffect(() => { loadTrades(); loadSettings(); }, []);

  async function loadTrades() {
    const { data, error } = await sb.from("trades").select("id, data").eq("user_id", user.id);
    if (error) { setCloudError("โหลดข้อมูลเทรดไม่สำเร็จ: " + error.message); return; }
    const list = (data || []).map(row => ({ ...row.data, id: row.id }));
    list.sort((a,b) => new Date(b.datetime) - new Date(a.datetime));
    setTrades(list);
  }

  async function loadSettings() {
    const { data, error } = await sb.from("settings").select("data").eq("user_id", user.id).maybeSingle();
    if (error) { setCloudError("โหลดการตั้งค่าไม่สำเร็จ: " + error.message); return; }
    if (data && data.data) setSettings({ ...initialSettings, ...data.data });
  }
  async function saveSettings(s) {
    setSettings(s);
    const { error } = await sb.from("settings").upsert({ user_id: user.id, data: s, updated_at: new Date().toISOString() });
    if (error) setCloudError("บันทึกการตั้งค่าไม่สำเร็จ: " + error.message);
    setShowSettings(false);
  }

  function resetForm() {
    const n = nowLocalDatetime();
    setForm({ ...initialForm, datetime: n, session: guessSession(n) });
    setImgBefore(null); setImgAfter(null); setEditingId(null); setError("");
    setOverrideChecked(false);
  }

  async function handleImage(e, which) {
    const file = e.target.files[0];
    if (!file) return;
    const dataUrl = await resizeImage(file);
    if (which === "before") setImgBefore(dataUrl); else setImgAfter(dataUrl);
  }

  // ---- money/equity calculation (chronological compounding using per-trade or default risk %) ----
  const moneyStats = useMemo(() => {
    const startingBalance = parseFloat(settings.startingBalance) || 0;
    const defaultRisk = parseFloat(settings.defaultRiskPercent) || 0;
    const chron = [...trades].sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
    let balance = startingBalance;
    const points = chron.map((t, i) => {
      const riskPct = parseFloat(t.riskPercent) || defaultRisk || 0;
      const dollarRisk = balance * (riskPct / 100);
      const pnl = dollarRisk * (t.rMultiple || 0);
      balance += pnl;
      return { idx: i+1, balance: parseFloat(balance.toFixed(2)), pnl: parseFloat(pnl.toFixed(2)), date: t.datetime ? t.datetime.slice(0,10) : null, id: t.id };
    });
    const currentBalance = points.length ? points[points.length-1].balance : startingBalance;
    const totalPnl = currentBalance - startingBalance;
    // today's stats
    const today = todayStr();
    const todaysPoints = points.filter(p => p.date === today);
    const todaysPnl = todaysPoints.reduce((s,p) => s+p.pnl, 0);
    const balanceBeforeToday = todaysPoints.length ? (todaysPoints[0].balance - todaysPoints[0].pnl) : currentBalance;
    const todaysPnlPercent = balanceBeforeToday ? (todaysPnl / balanceBeforeToday) * 100 : 0;
    const todaysTradeCount = todaysPoints.length;
    return { startingBalance, currentBalance, totalPnl, points, todaysPnl, todaysPnlPercent, todaysTradeCount };
  }, [trades, settings]);

  const limitInfo = useMemo(() => {
    if (!settings.lockEnabled) return { breached: false, reasons: [] };
    const lossLimitPct = parseFloat(settings.dailyLossLimitPercent) || 0;
    const maxTrades = parseInt(settings.maxTradesPerDay) || 0;
    const reasons = [];
    if (lossLimitPct > 0 && moneyStats.todaysPnlPercent <= -lossLimitPct) {
      reasons.push(`ขาดทุนวันนี้ ${fmt(Math.abs(moneyStats.todaysPnlPercent),1)}% ถึงลิมิต ${fmt(lossLimitPct,1)}% แล้ว`);
    }
    if (maxTrades > 0 && moneyStats.todaysTradeCount >= maxTrades) {
      reasons.push(`เทรดไปแล้ว ${moneyStats.todaysTradeCount} ไม้วันนี้ ถึงลิมิต ${maxTrades} ไม้/วันแล้ว`);
    }
    return { breached: reasons.length > 0, reasons };
  }, [settings, moneyStats]);

  const isLocked = limitInfo.breached && !overrideChecked && !editingId;

  async function saveTrade() {
    if (!form.symbol.trim() || !form.datetime || form.rMultiple === "") {
      setError("กรอกให้ครบ: สัญลักษณ์, วันที่/เวลา และ R-Multiple");
      return;
    }
    if (isLocked) {
      setError("ถึงลิมิตความเสี่ยงวันนี้แล้ว กรุณาติ๊กยืนยันด้านบนก่อนบันทึกไม้เพิ่ม");
      return;
    }
    setError("");
    const id = editingId || newId();
    const tradeObj = { ...form, id, symbol: form.symbol.trim().toUpperCase(), rMultiple: parseFloat(form.rMultiple), imgBefore: imgBefore || null, imgAfter: imgAfter || null };
    const { error } = await sb.from("trades").upsert({ id, user_id: user.id, data: tradeObj });
    if (error) { setError("บันทึกไม่สำเร็จ: " + error.message); return; }
    await loadTrades();
    resetForm();
    setTab("list");
  }

  async function deleteTrade(id) {
    const { error } = await sb.from("trades").delete().eq("id", id).eq("user_id", user.id);
    if (error) { setCloudError("ลบไม่สำเร็จ: " + error.message); return; }
    await loadTrades();
  }

  function editTrade(t) {
    setForm({ ...initialForm, ...t, rMultiple: String(t.rMultiple) });
    setImgBefore(t.imgBefore || null);
    setImgAfter(t.imgAfter || null);
    setEditingId(t.id);
    setTab("log");
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(trades, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `trading-journal-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const arr = JSON.parse(ev.target.result);
        if (!Array.isArray(arr)) throw new Error("bad format");
        const rows = arr.map((t) => {
          const id = isValidUuid(t.id) ? t.id : newId();
          return { id, user_id: user.id, data: { ...t, id } };
        });
        const { error } = await sb.from("trades").upsert(rows);
        if (error) throw error;
        await loadTrades();
      } catch (err) { alert("ไฟล์ไม่ถูกต้อง หรือนำเข้าไม่สำเร็จ: " + (err.message||"")); }
    };
    reader.readAsText(file);
  }

  const stats = useMemo(() => {
    if (trades.length === 0) return null;
    const chron = [...trades].sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
    const wins = trades.filter(t => t.result === "Win").length;
    const losses = trades.filter(t => t.result === "Loss").length;
    const be = trades.filter(t => t.result === "BE").length;
    const total = trades.length;
    const winRate = (wins+losses) ? (wins/(wins+losses))*100 : 0;
    const allR = trades.map(t => t.rMultiple);
    const avgR = mean(allR);
    const avgWinR = wins ? trades.filter(t=>t.result==="Win").reduce((s,t)=>s+t.rMultiple,0)/wins : 0;
    const avgLossR = losses ? trades.filter(t=>t.result==="Loss").reduce((s,t)=>s+t.rMultiple,0)/losses : 0;

    let running=0, peak=0, maxDD=0;
    const equity = chron.map((t,i) => {
      running += t.rMultiple;
      peak = Math.max(peak, running);
      maxDD = Math.max(maxDD, peak-running);
      return { idx: i+1, equity: parseFloat(running.toFixed(2)) };
    });

    function groupByFn(keyFn) {
      const map = {};
      trades.forEach(t => { const k = keyFn(t) || "ไม่ระบุ"; (map[k]=map[k]||[]).push(t); });
      return Object.entries(map).map(([name,arr]) => {
        const n = arr.length;
        const w = arr.filter(x=>x.result==="Win").length;
        const l = arr.filter(x=>x.result==="Loss").length;
        const wr = (w+l) ? (w/(w+l))*100 : 0;
        const expectancy = arr.reduce((s,x)=>s+x.rMultiple,0)/n;
        const score = Math.round(wilsonLowerBound(w,w+l)*100);
        return { name, n, winRate: wr, expectancy, score };
      }).sort((a,b) => b.score-a.score);
    }
    const groupBy = (key) => groupByFn(t => (t[key]||"ไม่ระบุ").trim() || "ไม่ระบุ");

    const buckets = [
      { label:"<-2R", min:-Infinity, max:-2, count:0 },
      { label:"-2~-1R", min:-2, max:-1, count:0 },
      { label:"-1~0R", min:-1, max:0, count:0 },
      { label:"0~1R", min:0, max:1, count:0 },
      { label:"1~2R", min:1, max:2, count:0 },
      { label:"2~3R", min:2, max:3, count:0 },
      { label:">3R", min:3, max:Infinity, count:0 },
    ];
    trades.forEach(t => { for (const b of buckets) { if (t.rMultiple > b.min && t.rMultiple <= b.max) { b.count++; break; } } });

    // --- institutional metrics ---
    const grossWin = allR.filter(r => r > 0).reduce((s,r)=>s+r, 0);
    const grossLoss = Math.abs(allR.filter(r => r < 0).reduce((s,r)=>s+r, 0));
    const profitFactor = grossLoss > 0 ? grossWin / grossLoss : (grossWin > 0 ? Infinity : 0);

    const sd = stdDev(allR);
    const sharpe = sd > 0 ? avgR / sd : 0;
    const downsideDev = Math.sqrt(mean(allR.map(r => Math.min(0, r) ** 2)));
    const sortino = downsideDev > 0 ? avgR / downsideDev : 0;

    const payoffRatio = avgLossR !== 0 ? Math.abs(avgWinR / avgLossR) : 0;
    const winFrac = (wins+losses) ? wins/(wins+losses) : 0;
    const kellyPct = payoffRatio ? (winFrac - (1-winFrac)/payoffRatio) * 100 : 0;

    const withChecklist = trades.filter(t => t.checklist);
    const disciplineScore = withChecklist.length
      ? mean(withChecklist.map(t => (Object.values(t.checklist).filter(Boolean).length / CHECKLIST_ITEMS.length) * 100))
      : null;

    const rollingWindow = Math.min(30, chron.length);
    const rollingWinRate = chron.map((t, i) => {
      const start = Math.max(0, i - rollingWindow + 1);
      const windowArr = chron.slice(start, i+1).filter(x => x.result === "Win" || x.result === "Loss");
      const w = windowArr.filter(x => x.result === "Win").length;
      const wr = windowArr.length ? (w/windowArr.length)*100 : 0;
      return { idx: i+1, value: parseFloat(wr.toFixed(1)) };
    });

    const weekdayRanking = groupByFn(t => t.datetime ? WEEKDAYS_TH[new Date(t.datetime).getDay()] : null);
    const hourRanking = groupByFn(t => {
      if (!t.datetime) return null;
      const h = new Date(t.datetime).getHours();
      if (h < 6) return "00-06";
      if (h < 12) return "06-12";
      if (h < 18) return "12-18";
      return "18-24";
    });

    let maxWinStreak = 0, maxLossStreak = 0, curW = 0, curL = 0;
    chron.forEach(t => {
      if (t.result === "Win") { curW++; curL = 0; maxWinStreak = Math.max(maxWinStreak, curW); }
      else if (t.result === "Loss") { curL++; curW = 0; maxLossStreak = Math.max(maxLossStreak, curL); }
    });

    const riskVals = trades.map(t => parseFloat(t.riskPercent)).filter(v => !Number.isNaN(v) && v > 0);
    const avgRiskPercent = riskVals.length ? mean(riskVals) : null;
    let riskOfRuinPct = null;
    if (avgRiskPercent) {
      const edge = 2 * (winRate/100) - 1;
      const units = 100 / avgRiskPercent;
      riskOfRuinPct = edge <= 0 ? 100 : Math.min(100, Math.pow((1-edge)/(1+edge), units) * 100);
    }

    const dayMap = {};
    chron.forEach(t => {
      if (!t.datetime) return;
      const d = t.datetime.slice(0,10);
      dayMap[d] = (dayMap[d]||0) + t.rMultiple;
    });
    const calendarData = Object.entries(dayMap).map(([date, r]) => ({ date, r })).sort((a,b) => a.date.localeCompare(b.date));

    const mfeVals = trades.map(t => parseFloat(t.mfeR)).filter(v => !Number.isNaN(v));
    const maeVals = trades.map(t => parseFloat(t.maeR)).filter(v => !Number.isNaN(v));
    const avgMFE = mfeVals.length ? mean(mfeVals) : null;
    const avgMAE = maeVals.length ? mean(maeVals) : null;
    const efficiencyTrades = trades.filter(t => {
      const m = parseFloat(t.mfeR);
      return !Number.isNaN(m) && m > 0;
    });
    const avgEfficiency = efficiencyTrades.length
      ? mean(efficiencyTrades.map(t => (t.rMultiple / parseFloat(t.mfeR)) * 100))
      : null;

    const lossTradesWithFlag = trades.filter(t => t.result === "Loss" && t.slHitThenRanToTP);
    const slTooTightCount = trades.filter(t => t.result === "Loss" && t.slHitThenRanToTP === "Yes").length;
    const slTooTightPct = lossTradesWithFlag.length ? (slTooTightCount / lossTradesWithFlag.length) * 100 : null;

    return {
      wins, losses, be, total, winRate, avgR, avgWinR, avgLossR, equity, maxDD,
      setupRanking: groupBy("setup"), sessionRanking: groupBy("session"), buckets, chron,
      profitFactor, sd, sharpe, sortino, kellyPct, disciplineScore, disciplineCount: withChecklist.length,
      rollingWinRate, rollingWindow, weekdayRanking, hourRanking, maxWinStreak, maxLossStreak,
      avgRiskPercent, riskOfRuinPct, calendarData, avgMFE, avgMAE, avgEfficiency, efficiencyCount: efficiencyTrades.length,
      slTooTightCount, slTooTightPct, slFlagCount: lossTradesWithFlag.length,
    };
  }, [trades]);

  return (
    <div style={{ minHeight:"100vh", background:"transparent", color:C.text, fontFamily:"'Inter', sans-serif" }}>
      <MarketTicker />
      <div style={{ borderBottom:`1px solid ${C.borderSoft}`, padding:"22px 20px 0", position:"relative", overflow:"hidden",
        background:"linear-gradient(120deg, rgba(47,111,237,0.24), rgba(55,211,224,0.14) 55%, transparent 90%)" }}>
        <div className="hero-globe-wrap"><GlobeCanvas width={380} height={210} /></div>
        <div style={{ maxWidth:"min(1680px, 94vw)", margin:"0 auto", position:"relative" }}>
          <div style={{ display:"flex", alignItems:"baseline", gap:10, flexWrap:"wrap" }}>
            <h1 style={{ fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:26, margin:0, letterSpacing:"-0.01em" }}>Ledger &amp; Edge</h1>
            <span style={{ fontSize:12, color:C.muted, fontFamily:"'JetBrains Mono', monospace" }}>trading journal · quant engine</span>
            <div style={{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center" }}>
              <span style={{ fontSize:11, color:C.muted, fontFamily:"'JetBrains Mono', monospace" }}>{user.email}</span>
              <button onClick={()=>setShowSettings(true)} title="ตั้งค่าพอร์ตและวินัยความเสี่ยง" className="chip-btn">
                <Icons.Settings size={13}/> ตั้งค่า
              </button>
              <button onClick={exportData} title="สำรองข้อมูลเป็นไฟล์ JSON" className="chip-btn">
                <Icons.Download size={13}/> สำรองข้อมูล
              </button>
              <input ref={importRef} type="file" accept="application/json" style={{ display:"none" }} onChange={importData} />
              <button onClick={()=>importRef.current.click()} title="นำเข้าไฟล์สำรอง" className="chip-btn">
                <Icons.Upload size={13}/> นำเข้า
              </button>
              <button onClick={()=>sb.auth.signOut()} title="ออกจากระบบ" className="chip-btn">
                <Icons.LogOut size={13}/> ออกจากระบบ
              </button>
            </div>
          </div>

          {cloudError && (
            <div style={{ marginTop:10, padding:"8px 12px", borderRadius:8, background:"rgba(255,90,90,0.12)", border:`1px solid ${C.coral}55`, fontSize:12, color:C.coral }}>
              ⚠ {cloudError}
            </div>
          )}

          {/* account balance strip */}
          <div style={{ display:"flex", alignItems:"center", gap:18, marginTop:14, flexWrap:"wrap" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div className="icon-badge" style={{ width:32, height:32, borderRadius:9 }}><Icons.Wallet size={16} color={C.text}/></div>
              <div>
                <div style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:"0.05em" }}>ยอดพอร์ตปัจจุบัน</div>
                <div style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:17, fontWeight:700 }}>{fmtMoney(moneyStats.currentBalance, settings.currency)}</div>
              </div>
            </div>
            <div>
              <div style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:"0.05em" }}>กำไร/ขาดทุนสะสม</div>
              <div style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:14, fontWeight:600, color: moneyStats.totalPnl>=0?C.mint:C.coral }}>
                {moneyStats.totalPnl>=0?"+":""}{fmtMoney(moneyStats.totalPnl, settings.currency)}
              </div>
            </div>
            <div>
              <div style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:"0.05em" }}>วันนี้</div>
              <div style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:14, fontWeight:600, color: moneyStats.todaysPnl>=0?C.mint:C.coral }}>
                {moneyStats.todaysPnl>=0?"+":""}{fmtMoney(moneyStats.todaysPnl, settings.currency)} ({fmt(moneyStats.todaysPnlPercent,1)}%) · {moneyStats.todaysTradeCount} ไม้
              </div>
            </div>
          </div>

          <div style={{ height:1, background:`linear-gradient(90deg, ${C.cyan}aa, transparent 70%)`, marginTop:14, boxShadow:`0 0 8px ${C.cyan}55` }} />
          <div style={{ display:"flex", gap:4, marginTop:14 }}>
            {[
              { k:"log", label:"บันทึกไม้", Icon: Icons.BookOpen },
              { k:"list", label:`รายการ (${trades.length})`, Icon: Icons.Activity },
              { k:"quant", label:"Quant Engine", Icon: Icons.TrendingUp },
            ].map(({k,label,Icon}) => (
              <button key={k} onClick={()=>setTab(k)} className={`tab-btn ${tab===k ? "active" : ""}`}>
                <Icon size={15}/> {label}
                {k==="log" && limitInfo.breached && <Icons.Lock size={12} color={C.coral} style={{ marginLeft:2 }}/>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:"min(1680px, 94vw)", margin:"0 auto", padding:"24px 20px 60px" }}>
        {tab === "log" && (
          <>
            <LimitBanner limitInfo={limitInfo} overrideChecked={overrideChecked} setOverrideChecked={setOverrideChecked} />
            <LogForm form={form} setForm={setForm} imgBefore={imgBefore} imgAfter={imgAfter}
              handleImage={handleImage} setImgBefore={setImgBefore} setImgAfter={setImgAfter}
              saveTrade={saveTrade} error={error} editingId={editingId} resetForm={resetForm}
              isLocked={isLocked} currentBalance={moneyStats.currentBalance} currency={settings.currency} />
          </>
        )}
        {tab === "list" && (
          <TradeList trades={trades} expanded={expanded} setExpanded={setExpanded}
            editTrade={editTrade} deleteTrade={deleteTrade} setLightbox={setLightbox} setTab={setTab} />
        )}
        {tab === "quant" && <QuantEngine stats={stats} moneyStats={moneyStats} settings={settings} />}
      </div>

      {lightbox && (
        <div onClick={()=>setLightbox(null)} style={{ position:"fixed", inset:0, background:"#000000dd", display:"flex", alignItems:"center", justifyContent:"center", zIndex:50, cursor:"zoom-out", padding:20 }}>
          <img src={lightbox} style={{ maxWidth:"100%", maxHeight:"100%", borderRadius:8 }} />
        </div>
      )}
      {showSettings && (
        <SettingsModal settings={settings} onSave={saveSettings} onClose={()=>setShowSettings(false)} />
      )}
    </div>
  );
}

function LogForm({ form, setForm, imgBefore, imgAfter, handleImage, setImgBefore, setImgAfter, saveTrade, error, editingId, resetForm, isLocked, currentBalance, currency }) {
  function upd(k,v) { setForm(f => ({ ...f, [k]:v })); }

  function updSymbol(v) {
    setForm(f => {
      const next = { ...f, symbol: v };
      if (!f.pointValue) {
        const guess = guessPointValue(v);
        if (guess !== "") next.pointValue = String(guess);
      }
      return next;
    });
  }

  const lot = parseFloat(form.lotSize);
  const slPips = parseFloat(form.slPips);
  const ptVal = parseFloat(form.pointValue);
  const hasLotCalc = lot > 0 && slPips > 0 && ptVal > 0;
  const dollarRisk = hasLotCalc ? lot * slPips * ptVal : null;
  const calcRiskPercent = hasLotCalc && currentBalance > 0 ? (dollarRisk / currentBalance) * 100 : null;

  const rNum = parseFloat(form.rMultiple);
  const mfeNum = parseFloat(form.mfeR);
  const maeNum = parseFloat(form.maeR);
  const hasEfficiency = !Number.isNaN(rNum) && !Number.isNaN(mfeNum) && mfeNum > 0;
  const efficiencyPct = hasEfficiency ? (rNum / mfeNum) * 100 : null;

  function applyCalcRisk() {
    if (calcRiskPercent !== null) upd("riskPercent", calcRiskPercent.toFixed(2));
  }

  return (
    <div className="glass" style={{ padding:22 }}>
      <div style={{ fontFamily:"'Fraunces', serif", fontSize:18, marginBottom:18, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span>{editingId ? "แก้ไขไม้เทรด" : "บันทึกไม้ใหม่"}</span>
        {editingId && <button onClick={resetForm} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:12, display:"flex", alignItems:"center", gap:4 }}><Icons.X size={13}/> ยกเลิกแก้ไข</button>}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
        <Field label="วันที่ / เวลาเข้า">
          <div style={{ display:"flex", gap:8 }}>
            <input type="datetime-local" className="field-input" value={form.datetime}
              onChange={(e)=>{ upd("datetime", e.target.value); upd("session", guessSession(e.target.value)); }} />
            <button type="button" onClick={()=>{ const n = nowLocalDatetime(); upd("datetime", n); upd("session", guessSession(n)); }}
              className="chip-btn" style={{ flexShrink:0, whiteSpace:"nowrap" }}>ตอนนี้</button>
          </div>
        </Field>
        <Field label="สัญลักษณ์ (Symbol)">
          <input className="field-input" list="symbol-suggestions" placeholder="EURUSD, XAUUSD, BTCUSD…" value={form.symbol} onChange={(e)=>updSymbol(e.target.value.toUpperCase())} />
          <datalist id="symbol-suggestions">{SYMBOL_SUGGESTIONS.map(s => <option key={s} value={s} />)}</datalist>
        </Field>
        <Field label="ทิศทาง">
          <div style={{ display:"flex", gap:8 }}>
            {["Long","Short"].map(d => (
              <button key={d} onClick={()=>upd("direction", d)}
                className={`toggle-btn ${form.direction===d ? (d==="Long"?"on-mint":"on-coral") : ""}`}>
                {d==="Long" ? "Long ▲" : "Short ▼"}
              </button>
            ))}
          </div>
        </Field>
        <Field label="Session">
          <select className="field-input" value={form.session} onChange={(e)=>upd("session", e.target.value)}>
            {SESSIONS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="Setup">
          <input className="field-input" list="setup-suggestions" placeholder="เช่น Breakout, Pullback…" value={form.setup} onChange={(e)=>upd("setup", e.target.value)} />
          <datalist id="setup-suggestions">{SETUP_SUGGESTIONS.map(s => <option key={s} value={s} />)}</datalist>
        </Field>
        <Field label="อารมณ์ขณะเข้าไม้ (ถ้าต้องการ)">
          <select className="field-input" value={form.emotion} onChange={(e)=>upd("emotion", e.target.value)}>
            {EMOTIONS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="ผลลัพธ์">
          <div style={{ display:"flex", gap:8 }}>
            {["Win","Loss","BE"].map(r => (
              <button key={r} onClick={()=>upd("result", r)}
                className={`toggle-btn ${form.result===r ? (r==="Win"?"on-mint":r==="Loss"?"on-coral":"on-amber") : ""}`}>
                {r}
              </button>
            ))}
          </div>
        </Field>
        <Field label="R-Multiple ผลลัพธ์ (เช่น 2 = +2R, -1 = -1R)">
          <input type="number" step="0.1" className="field-input" style={{ fontFamily:"'JetBrains Mono', monospace" }} placeholder="0.0" value={form.rMultiple} onChange={(e)=>upd("rMultiple", e.target.value)} />
        </Field>
        <Field label="MFE — กำไรสูงสุดที่ไม้เคยวิ่งไปทางถูกทาง (R)">
          <input type="number" step="0.1" className="field-input" style={{ fontFamily:"'JetBrains Mono', monospace" }} placeholder="เช่น 3.0" value={form.mfeR} onChange={(e)=>upd("mfeR", e.target.value)} />
        </Field>
        <Field label="MAE — ขาดทุนสูงสุดที่ไม้เคยติดลบก่อนปิด (R, ใส่ค่าลบ)">
          <input type="number" step="0.1" className="field-input" style={{ fontFamily:"'JetBrains Mono', monospace" }} placeholder="เช่น -0.8" value={form.maeR} onChange={(e)=>upd("maeR", e.target.value)} />
        </Field>

        {form.result === "Loss" && (
          <Field label="หลังโดน SL ราคาวิ่งต่อไปทาง TP ตามแผนไหม (เช็ค SL แคบไปหรือเปล่า)" span>
            <div style={{ display:"flex", gap:8 }}>
              {["No","Yes"].map(v => (
                <button key={v} type="button" onClick={()=>upd("slHitThenRanToTP", v)}
                  className={`toggle-btn ${form.slHitThenRanToTP===v ? (v==="Yes"?"on-amber":"on-mint") : ""}`}>
                  {v==="Yes" ? "ใช่ — วิ่งต่อไปทาง TP" : "ไม่ — ไปคนละทาง/กลับตัวจริง"}
                </button>
              ))}
            </div>
            {form.slHitThenRanToTP==="Yes" && (
              <div style={{ marginTop:8, fontSize:12, color:C.amber }}>
                ⚠ สัญญาณว่า SL อาจแคบไปสำหรับ setup นี้ — เก็บไว้ทบทวนตอนอัปเดต SOP รอบถัดไป (ไม่ใช่ขยับ SL ระหว่างถือไม้ที่เปิดอยู่ ยึดกฎเหล็กเดิมต่อไป)
              </div>
            )}
          </Field>
        )}
        <Field label="ประสิทธิภาพการปิดไม้ (คำนวณจาก R-Multiple ÷ MFE)" span>
          <div className="glass-soft" style={{ padding:"12px 14px", fontSize:12.5 }}>
            {hasEfficiency ? (
              <div>
                จับกำไรได้ <b style={{ fontFamily:"'JetBrains Mono', monospace", color: efficiencyPct>=70?C.mint:efficiencyPct>=35?C.amber:C.coral }}>
                  {fmt(efficiencyPct,0)}%
                </b> ของโอกาสที่มี (TP ที่ตั้งไว้ได้ {fmt(rNum,1)}R จากที่ราคาวิ่งได้ถึง {fmt(mfeNum,1)}R)
                {efficiencyPct < 40 && <div style={{ color:C.muted, marginTop:4 }}>ต่ำกว่า 40% — ไม่ใช่ปัญหาวินัย (คุณทำตามระบบเป๊ะอยู่แล้ว) แต่เป็นสัญญาณว่า TP ที่ตั้งไว้อาจอนุรักษ์นิยมไปสำหรับ setup นี้ เก็บไว้ทบทวนตอนอัปเดต SOP รอบถัดไป</div>}
              </div>
            ) : (
              <div style={{ color:C.muted }}>กรอก R-Multiple และ MFE ให้ครบ ระบบจะคำนวณ % ประสิทธิภาพการปิดไม้ให้อัตโนมัติ</div>
            )}
          </div>
        </Field>
        <Field label="ความเสี่ยงต่อไม้ (% ของพอร์ต)">
          <input type="number" step="0.1" className="field-input" style={{ fontFamily:"'JetBrains Mono', monospace" }} placeholder="เช่น 1.0" value={form.riskPercent} onChange={(e)=>upd("riskPercent", e.target.value)} />
        </Field>
        <Field label="ออก Lot เท่าไหร่">
          <input type="number" step="0.01" className="field-input" style={{ fontFamily:"'JetBrains Mono', monospace" }} placeholder="เช่น 0.01" value={form.lotSize} onChange={(e)=>upd("lotSize", e.target.value)} />
        </Field>
        <Field label="Stop Loss ห่างกี่จุด (pips/points)">
          <input type="number" step="0.1" className="field-input" style={{ fontFamily:"'JetBrains Mono', monospace" }} placeholder="เช่น 20" value={form.slPips} onChange={(e)=>upd("slPips", e.target.value)} />
        </Field>
        <Field label="มูลค่าต่อจุด ต่อ 1.00 Lot (ประมาณอัตโนมัติ แก้ไขได้)">
          <input type="number" step="0.01" className="field-input" style={{ fontFamily:"'JetBrains Mono', monospace" }} placeholder="เช่น 10" value={form.pointValue} onChange={(e)=>upd("pointValue", e.target.value)} />
        </Field>
        <Field label="ความเสี่ยงที่คำนวณได้ (อัตโนมัติจาก Lot)" span>
          <div className="glass-soft" style={{ padding:"12px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, flexWrap:"wrap" }}>
            {hasLotCalc ? (
              <>
                <div style={{ fontSize:13 }}>
                  เสี่ยงประมาณ <b style={{ fontFamily:"'JetBrains Mono', monospace" }}>{fmtMoney(dollarRisk, currency)}</b>
                  {" "}({fmt(calcRiskPercent,2)}% ของพอร์ต {fmtMoney(currentBalance, currency)})
                </div>
                <button type="button" onClick={applyCalcRisk} className="chip-btn">ใช้ค่านี้เติมช่อง % ความเสี่ยง</button>
              </>
            ) : (
              <div style={{ fontSize:12.5, color:C.muted }}>กรอก Lot, จุด SL และมูลค่าต่อจุด ให้ครบ ระบบจะคำนวณ % ความเสี่ยงให้อัตโนมัติ</div>
            )}
          </div>
          <div style={{ fontSize:11, color:C.mutedDim, marginTop:6 }}>* มูลค่าต่อจุดเป็นค่าประมาณตามชนิดสินทรัพย์ทั่วไป ควรเทียบกับสเปกสัญญาจริงของโบรกเกอร์เพื่อความแม่นยำ</div>
        </Field>
        <Field label="Slippage (R, ถ้ามี — ราคาจริงเทียบราคาที่ตั้งใจ)">
          <input type="number" step="0.01" className="field-input" style={{ fontFamily:"'JetBrains Mono', monospace" }} placeholder="เช่น -0.1" value={form.slippageR} onChange={(e)=>upd("slippageR", e.target.value)} />
        </Field>
        <Field label="ระยะเวลาถือไม้ (นาที)">
          <input type="number" step="1" className="field-input" style={{ fontFamily:"'JetBrains Mono', monospace" }} placeholder="เช่น 45" value={form.durationMinutes} onChange={(e)=>upd("durationMinutes", e.target.value)} />
        </Field>
        <Field label="มีข่าวสำคัญระหว่างถือไม้ไหม">
          <div style={{ display:"flex", gap:8 }}>
            {["No","Yes"].map(v => (
              <button key={v} onClick={()=>upd("newsDuringTrade", v)}
                className={`toggle-btn ${form.newsDuringTrade===v ? (v==="Yes"?"on-amber":"on-mint") : ""}`}>
                {v==="Yes" ? "มีข่าว" : "ไม่มี"}
              </button>
            ))}
          </div>
        </Field>
        <Field label="เช็คลิสต์ก่อนเข้า (วัด Discipline Score)" span>
          <div className="glass-soft" style={{ padding:"10px 12px", display:"flex", flexDirection:"column", gap:8 }}>
            {CHECKLIST_ITEMS.map(item => (
              <label key={item.key} style={{ display:"flex", alignItems:"center", gap:10, fontSize:13, cursor:"pointer", color: form.checklist[item.key] ? C.text : C.muted }}>
                <input type="checkbox" checked={!!form.checklist[item.key]}
                  onChange={(e)=>upd("checklist", { ...form.checklist, [item.key]: e.target.checked })}
                  style={{ width:16, height:16, accentColor: C.cyan }} />
                {item.label}
              </label>
            ))}
          </div>
        </Field>
        <Field label="เหตุผลในการเข้าไม้" span>
          <textarea className="field-input" style={{ minHeight:70, resize:"vertical" }} placeholder="เช่น เบรกแนวรับ retest + volume ยืนยัน…" value={form.reason} onChange={(e)=>upd("reason", e.target.value)} />
        </Field>
        <Field label="โน้ตเพิ่มเติม (ถ้ามี)" span>
          <textarea className="field-input" style={{ minHeight:50, resize:"vertical" }} placeholder="สิ่งที่เรียนรู้ / สิ่งที่ควรทำต่างออกไป…" value={form.notes} onChange={(e)=>upd("notes", e.target.value)} />
        </Field>
        <Field label="ภาพก่อนเข้า">
          <ImageSlot img={imgBefore} onChange={(e)=>handleImage(e,"before")} onClear={()=>setImgBefore(null)} />
        </Field>
        <Field label="ภาพหลังออก">
          <ImageSlot img={imgAfter} onChange={(e)=>handleImage(e,"after")} onClear={()=>setImgAfter(null)} />
        </Field>
      </div>
      {error && <div style={{ color:C.coral, fontSize:13, marginTop:14 }}>{error}</div>}
      <button onClick={saveTrade} className="btn-primary" style={{ marginTop:18 }} disabled={isLocked}>
        {isLocked ? <><Icons.Lock size={16}/> ล็อกอยู่ — ติ๊กยืนยันด้านบนก่อน</> : <><Icons.Plus size={16}/> {editingId ? "บันทึกการแก้ไข" : "บันทึกไม้นี้"}</>}
      </button>
    </div>
  );
}

function ImageSlot({ img, onChange, onClear }) {
  const ref = useRef(null);
  return (
    <div>
      <input ref={ref} type="file" accept="image/*" style={{ display:"none" }} onChange={onChange} />
      {img ? (
        <div style={{ position:"relative" }}>
          <img src={img} style={{ width:"100%", height:110, objectFit:"cover", borderRadius:8, border:`1px solid ${C.border}` }} />
          <button onClick={onClear} style={{ position:"absolute", top:6, right:6, background:"#000000aa", border:"none", borderRadius:6, color:"#fff", padding:4, cursor:"pointer", display:"flex" }}><Icons.X size={13}/></button>
        </div>
      ) : (
        <button onClick={()=>ref.current.click()} className="image-slot-empty">
          <Icons.Camera size={18}/> แนบรูปภาพ
        </button>
      )}
    </div>
  );
}

        <div style={{ fontSize:13, marginBottom:18 }}>เริ่มบันทึกไม้แรกเพื่อให้ Quant Engine มีข้อมูลวิเคราะห์</div>

        <div style={{ fontFamily:"'Fraunces', serif", fontSize:18, color:C.text, marginBottom:8 }}>ยังไม่มีข้อมูลให้วิเคราะห์</div>
        <div style={{ fontSize:13 }}>บันทึกไม้อย่างน้อย 2-3 ไม้ แล้ว Quant Engine จะเริ่มคำนวณสถิติให้</div>

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>

        <StatCard label="Expectancy" value={`${stats.avgR>=0?"+":""}${fmt(stats.avgR,2)}R`} color={stats.avgR>=0?C.mint:C.coral} Icon={Icons.Activity} />
        <StatCard label="เทรดทั้งหมด" value={`${stats.total}`} color={C.text} sub={`W ${stats.wins} / L ${stats.losses} / BE ${stats.be}`} Icon={Icons.BookOpen} />

              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:14, fontWeight:600 }}>{s.name}</div>
                <div style={{ fontSize:11.5, color:C.muted, fontFamily:"'JetBrains Mono', monospace" }}>
                  n={s.n} · WR {fmt(s.winRate,0)}% · Exp {s.expectancy>=0?"+":""}{fmt(s.expectancy,2)}R

              </div>

          ))}

      <div className="quad-grid" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>

        <Panel title="กระจายตัวของ RR">

        </Panel>
        <Panel title="วิเคราะห์ตามช่วงเวลา">
          <RadialStatGrid data={stats.hourRanking} />
        </Panel>

      <Panel title="Calendar Heatmap (กำไร-ขาดทุนรายวัน เป็น R)">

        <StatCard label="Avg Win" value={`+${fmt(stats.avgWinR,2)}R`} color={C.mint} />
        <StatCard label="Avg Loss" value={`${fmt(stats.avgLossR,2)}R`} color={C.coral} />
      </div>

      <div className="stat-row" style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:10 }}>
        <StatCard label="Avg MFE" value={stats.avgMFE===null ? "—" : `+${fmt(stats.avgMFE,2)}R`} color={C.mint}
          sub="โอกาสกำไรสูงสุดเฉลี่ยที่มี" Icon={Icons.TrendingUp} />
        <StatCard label="Avg MAE" value={stats.avgMAE===null ? "—" : `${fmt(stats.avgMAE,2)}R`} color={C.coral}
          sub="ขาดทุนลึกสุดเฉลี่ยก่อนปิด" Icon={Icons.TrendingDown} />
        <StatCard label="Trade Efficiency" value={stats.avgEfficiency===null ? "—" : `${fmt(stats.avgEfficiency,0)}%`}
          color={stats.avgEfficiency>=70?C.mint:stats.avgEfficiency>=35?C.amber:C.coral}
          sub={stats.efficiencyCount ? `จับกำไรเฉลี่ยจาก ${stats.efficiencyCount} ไม้ที่มี MFE` : "ยังไม่มีข้อมูล MFE"} Icon={Icons.Activity} />
      </div>

      <div className="stat-row" style={{ display:"grid", gridTemplateColumns:"1fr", gap:10 }}>
        <StatCard label="SL แคบไป (โดน SL แล้ววิ่งต่อไปทาง TP)"
          value={stats.slTooTightPct===null ? "—" : `${fmt(stats.slTooTightPct,0)}%`}
          color={stats.slTooTightPct>=40?C.coral:stats.slTooTightPct>=15?C.amber:C.mint}
          sub={stats.slFlagCount ? `${stats.slTooTightCount} จาก ${stats.slFlagCount} ไม้ที่ Loss และมีข้อมูลนี้ — ถ้าเปอร์เซ็นต์สูง ควรพิจารณาขยาย SL ในรอบทบทวน SOP ถัดไป` : "ยังไม่มีข้อมูล — ตอบคำถามนี้เมื่อบันทึกไม้ที่ Loss"}
          Icon={Icons.AlertTriangle} />
      </div>
    </div>
  );
}

function Panel({ title, children }) {

    <div className="glass" style={{ padding:16 }}>
      <div style={{ fontSize:12.5, color:C.muted, marginBottom:12, letterSpacing:"0.03em" }}>{title}</div>

}
function StatCard({ label, value, color, sub, Icon }) {
  return (
    <div className="glass" style={{ padding:"14px 16px", display:"flex", alignItems:"center", gap:14 }}>
      {Icon && (
        <div className="icon-badge" style={{ flexShrink:0 }}>
          <Icon size={19} color={C.text} />
        </div>
      )}
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:10.5, color:C.muted, textTransform:"uppercase", letterSpacing:"0.05em" }}>{label}</div>
        <div style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:22, fontWeight:700, color, marginTop:3, textShadow:`0 0 18px ${color}44` }}>{value}</div>
        {sub && <div style={{ fontSize:10.5, color:C.muted, marginTop:3 }}>{sub}</div>}
      </div>
    </div>
  );
}

// ---------- login screen ----------
function LoginScreen() {
  const [mode, setMode] = useState("signin"); // signin | signup
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  async function submit(e) {
    e.preventDefault();
    setMsg(""); setBusy(true);
    try {
      if (mode === "signin") {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        setMsg("สมัครสำเร็จ! เช็คอีเมลเพื่อยืนยันตัวตน (ถ้าโปรเจกต์เปิด email confirmation ไว้) แล้วกลับมา Sign in");
      }
    } catch (err) {
      setMsg(err.message || "เกิดข้อผิดพลาด");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <form onSubmit={submit} className="glass" style={{ width:"100%", maxWidth:380, padding:28 }}>
        <div style={{ fontFamily:"'Fraunces', serif", fontSize:24, fontWeight:600, marginBottom:4 }}>Ledger &amp; Edge</div>
        <div style={{ fontSize:12.5, color:C.muted, marginBottom:22 }}>
          {mode === "signin" ? "เข้าสู่ระบบเพื่อดูข้อมูลเทรดของคุณจากทุกเครื่อง" : "สมัครสมาชิกใหม่"}
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <input type="email" required placeholder="อีเมล" value={email} onChange={(e)=>setEmail(e.target.value)}
            style={inputStyle} autoComplete="username" />
          <input type="password" required placeholder="รหัสผ่าน (อย่างน้อย 6 ตัวอักษร)" value={password} onChange={(e)=>setPassword(e.target.value)}
            style={inputStyle} autoComplete={mode==="signin"?"current-password":"new-password"} minLength={6} />
        </div>

        {msg && <div style={{ marginTop:12, fontSize:12.5, color: msg.includes("สำเร็จ") ? C.mint : C.coral }}>{msg}</div>}

        <button type="submit" disabled={busy} className="btn-primary" style={{ width:"100%", marginTop:18, padding:"11px 0", justifyContent:"center" }}>
          {busy ? "กำลังดำเนินการ..." : mode === "signin" ? "เข้าสู่ระบบ" : "สมัครสมาชิก"}
        </button>

        <div style={{ textAlign:"center", marginTop:16, fontSize:12.5, color:C.muted }}>
          {mode === "signin" ? (
            <span>ยังไม่มีบัญชี? <a href="#" onClick={(e)=>{e.preventDefault(); setMode("signup"); setMsg("");}} style={{ color:C.cyanNeon }}>สมัครที่นี่</a></span>
          ) : (
            <span>มีบัญชีแล้ว? <a href="#" onClick={(e)=>{e.preventDefault(); setMode("signin"); setMsg("");}} style={{ color:C.cyanNeon }}>เข้าสู่ระบบ</a></span>
          )}
        </div>
      </form>
    </div>
  );
}

function Root() {
  const [session, setSession] = useState(undefined); // undefined = loading, null = no session

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = sb.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => listener.subscription.unsubscribe();
  }, []);

  if (session === undefined) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color:C.muted }}>กำลังโหลด...</div>;
  }
  if (!session) return <LoginScreen />;
  return <App user={session.user} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
</script>
</body>
</html>
